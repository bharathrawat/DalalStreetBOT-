name: DalalStreet Bot

on:
  workflow_dispatch:
  schedule:
    - cron: '30 3 * * 1-5'   # 9:00 AM IST
    - cron: '30 4 * * 1-5'   # 10:00 AM IST
    - cron: '00 7 * * 1-5'   # 12:30 PM IST
    - cron: '45 9 * * 1-5'   # 3:15 PM IST

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run bot
        run: python main.py
        env:
          ANGEL_API_KEY: ${{ secrets.ANGEL_API_KEY }}
          ANGEL_CLIENT_ID: ${{ secrets.ANGEL_CLIENT_ID }}
          ANGEL_PASSWORD: ${{ secrets.ANGEL_PASSWORD }}
          ANGEL_TOTP: ${{ secrets.ANGEL_TOTP }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
